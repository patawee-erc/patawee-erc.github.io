<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="เครื่องมือสร้างพื้นหลัง PowerPoint แบบกำหนดเองพร้อมดาวน์โหลดเป็นไฟล์ PPTX">
    <title>PowerPoint Background Generator Pro</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5261/5261474.png">
    

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    
    <style>
        body { font-family: 'Prompt', sans-serif; }
        

        .hide-on-download { display: block; }
        .downloading .hide-on-download { display: none !important; }
        
       
        .logo-container {
            position: absolute;
            z-index: 20;
            padding: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-top-right { top: 0; right: 0; }
        .logo-bottom-right { bottom: 0; right: 0; }
        .logo-top-left { top: 0; left: 0; }
        .logo-bottom-left { bottom: 0; left: 0; }
        .logo-hidden { display: none; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10 px-4">

    <main class="max-w-[95%] w-full flex flex-col md:flex-row gap-8">

        <aside class="w-full md:w-1/4 bg-white p-6 rounded-2xl shadow-lg h-fit flex flex-col gap-6">

                    <input type="range" id="logo-size-slider" min="5" max="40" value="15" oninput="updateLogoSize()" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[#009bc9]">
                </div>
            </section>

            <section class="flex items-center gap-2 border-t pt-4">
                <input type="checkbox" id="show-placeholder" checked onchange="togglePlaceholder()" class="w-4 h-4 text-[#009bc9] rounded border-gray-300 focus:ring-[#009bc9]">
                <label for="show-placeholder" class="text-xs text-gray-700 cursor-pointer select-none">แสดงพื้นที่เนื้อหา (จำลอง)</label>
            </section>

            <button onclick="exportPPTX()" id="download-btn" class="mt-2 w-full bg-gradient-to-r from-[#f37737] to-[#009bc9] hover:from-[#e0682b] hover:to-[#0086af] text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all transform hover:scale-[1.02] active:scale-95 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />

                </div>

                
                <div id="svg-container" class="absolute inset-0 w-full h-full pointer-events-none">
                   
                </div>

        </section>

        ];


        document.addEventListener('DOMContentLoaded', () => {
            renderButtons();
            setDesign(1); 
        });
        function renderButtons() {
            const container = document.getElementById('design-buttons-container');

            const header = container.querySelector('h2').outerHTML;
            let buttonsHTML = '';

            designs.forEach(design => {
                buttonsHTML += `
                    <button 
                        onclick="setDesign(${design.id})" 
                        id="btn-design-${design.id}" 
                        class="design-btn w-full text-left px-4 py-3 rounded-xl border-2 border-gray-200 hover:border-[#009bc9] text-gray-600 transition-all duration-200 text-sm hover:bg-[#f0f9fc]">
                        ${design.name}
                    </button>
                `;
            });

            container.innerHTML = header + buttonsHTML;
        }


        function setDesign(id) {
            const design = designs.find(d => d.id === id);
            if (!design) return;

            document.getElementById('svg-container').innerHTML = design.svg;
            

            const buttons = document.querySelectorAll('.design-btn');
            buttons.forEach(btn => {
                if (btn.id === `btn-design-${id}`) {
                    btn.classList.add('border-[#009bc9]', 'bg-[#e6f5fa]', 'text-[#007a9e]', 'font-semibold');
                    btn.classList.remove('border-gray-200', 'text-gray-600', 'hover:bg-[#f0f9fc]');
                } else {
                    btn.classList.remove('border-[#009bc9]', 'bg-[#e6f5fa]', 'text-[#007a9e]', 'font-semibold');
                    btn.classList.add('border-gray-200', 'text-gray-600', 'hover:bg-[#f0f9fc]');
                }
            });
        }


        function updateLogoImage() {
            const selectedType = document.getElementById('logo-type').value;
            document.getElementById('logo-img').src = logoUrls[selectedType];
        }

        function updateLogoPosition() {
            const pos = document.getElementById('logo-position').value;
            const logoEl = document.getElementById('logo-el');
            const currentWidth = logoEl.style.width;
            logoEl.className = 'logo-container ' + pos;
            logoEl.style.width = currentWidth;
        }

        function updateLogoSize() {
            const size = document.getElementById('logo-size-slider').value;
            const logoEl = document.getElementById('logo-el');
            const display = document.getElementById('size-display');
            logoEl.style.width = size + '%';
            display.innerText = size + '%';
        }

        function togglePlaceholder() {
            const isChecked = document.getElementById('show-placeholder').checked;
            document.getElementById('placeholder-content').style.opacity = isChecked ? '1' : '0';
        }


        function exportPPTX() {
            const slideElement = document.getElementById('slide-canvas');
            const btnText = document.getElementById('btn-text');
            const downloadBtn = document.getElementById('download-btn');

            btnText.innerText = "กำลังประมวลผล...";
            downloadBtn.classList.add('opacity-75', 'cursor-not-allowed');
            downloadBtn.disabled = true;
            slideElement.classList.add('downloading');

            setTimeout(() => {
                html2canvas(slideElement, {
                    scale: 1920 / slideElement.offsetWidth, 
                    width: slideElement.offsetWidth,
                    height: slideElement.offsetHeight,
                    backgroundColor: "#ffffff",
                    useCORS: true, 
                    allowTaint: false
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');

                    let pptx = new PptxGenJS();
                    pptx.layout = 'LAYOUT_16x9'; 
                    let slide = pptx.addSlide();
                    
                    slide.background = { data: imgData };

                    pptx.writeFile({ fileName: 'Template-Corporate-Presentation.pptx' }).then(() => {
                        resetDownloadState();
                    });

                }).catch(err => {
                    console.error("Canvas Rendering Error:", err);
                    resetDownloadState();
                    alert("เกิดข้อผิดพลาดในการสร้างไฟล์ กรุณาลองใหม่อีกครั้ง");
                });
            }, 100);

            function resetDownloadState() {
                slideElement.classList.remove('downloading');
                btnText.innerText = "ดาวน์โหลดไฟล์ (PPTX)";
                downloadBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                downloadBtn.disabled = false;
            }
        }
    </script>
