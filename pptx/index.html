<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="เครื่องมือสร้างพื้นหลัง PowerPoint แบบกำหนดเองพร้อมดาวน์โหลดเป็นไฟล์ PPTX">
    <title>PowerPoint Background Generator Pro</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5261/5261474.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    
    <style>
        body { font-family: 'Prompt', sans-serif; }
        
        .hide-on-download { display: block; }
        .downloading .hide-on-download { display: none !important; }
        
        .logo-container {
            position: absolute;
            z-index: 20;
            padding: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-top-right { top: 0; right: 0; }
        .logo-bottom-right { bottom: 0; right: 0; }
        .logo-top-left { top: 0; left: 0; }
        .logo-bottom-left { bottom: 0; left: 0; }
        .logo-hidden { display: none; }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center py-6 px-4 overflow-hidden">

    <main class="max-w-[95%] w-full h-full flex flex-col md:flex-row gap-8">
        
        <!-- Sidebar Controls -->
        <aside class="w-full md:w-1/4 lg:w-[28%] bg-white p-6 rounded-2xl shadow-lg h-full flex flex-col gap-6 overflow-y-auto custom-scrollbar relative">
            <header class="sticky top-0 bg-white pb-2 z-10 border-b border-gray-100">
                <h1 class="text-xl font-bold text-gray-800 mb-1">Template Powerpoint ERC</h1>
                <p class="text-sm text-gray-500">อัตราส่วน 16:9 | Export as PPTX</p>
            </header>

            <!-- Custom Dropdown -->
            <section class="flex flex-col gap-2 relative" id="custom-dropdown-container">
                <label class="block font-semibold text-gray-700 text-sm">เลือกรูปแบบเฟรม:</label>
                
                <button id="dropdown-btn" onclick="toggleDropdown()" class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 hover:bg-gray-100 focus:ring-2 focus:ring-[#009bc9] outline-none flex justify-between items-center text-left transition-colors">
                    <span id="selected-design-text" class="truncate text-gray-700 font-medium">กำลังโหลด...</span>
                    <!-- ไอคอนลูกศร -->
                    <svg id="dropdown-arrow" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>

                <!-- รายการ Dropdown -->
                <div id="dropdown-menu" class="absolute top-[65px] left-0 w-full bg-white border border-gray-200 rounded-lg shadow-xl z-50 max-h-64 overflow-y-auto custom-scrollbar hidden opacity-0 transition-opacity duration-200">
                    <ul id="design-list" class="py-1 relative">
                        <!-- Options จะถูกสร้างจาก JavaScript -->
                    </ul>
                </div>
            </section>

            <!-- Logo Controls -->
            <section class="flex flex-col gap-4 border-t pt-4">
                <div>
                    <label for="logo-type" class="block font-semibold text-gray-700 text-sm mb-2">รูปแบบโลโก้:</label>
                    <select id="logo-type" onchange="updateLogoImage()" class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-[#009bc9] outline-none">
                        <option value="logo-el1">ERC พื้นหลังขาว</option>
                        <option value="logo-el2">ERC พื้นหลังใส</option>
                        <option value="logo-el3">ERC ขอบขาว</option>
                    </select>
                </div>

                <div>
                    <label for="logo-position" class="block font-semibold text-gray-700 text-sm mb-2">ตำแหน่งโลโก้:</label>
                    <select id="logo-position" onchange="updateLogoPosition()" class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-[#009bc9] outline-none">
                        <option value="logo-bottom-right">ขวาล่าง (แนะนำ)</option>
                        <option value="logo-top-right">ขวาบน</option>
                        <option value="logo-top-left">ซ้ายบน</option>
                        <option value="logo-bottom-left">ซ้ายล่าง</option>
                        <option value="logo-hidden">ไม่แสดงโลโก้</option>
                    </select>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label for="logo-size-slider" class="font-semibold text-gray-700 text-sm">ขนาดโลโก้ (%):</label>
                        <span id="size-display" class="text-xs font-bold text-[#009bc9]">15%</span>
                    </div>
                    <input type="range" id="logo-size-slider" min="5" max="40" value="15" oninput="updateLogoSize()" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[#009bc9]">
                </div>
            </section>

            <!-- Page Number Position -->
            <div class="border-t pt-4 mt-2">
                <label for="page-num-position" class="block font-semibold text-gray-700 text-sm mb-2">ตำแหน่งเลขหน้าสไลด์:</label>
                <select id="page-num-position" onchange="updatePageNumberPosition()" class="w-full p-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-[#009bc9] outline-none">
                    <option value="bottom-center" selected>ตรงกลางล่าง (ค่าเริ่มต้น)</option>
                    <option value="bottom-right">ขวาล่าง</option>
                    <option value="bottom-left">ซ้ายล่าง</option>
                    <option value="hidden">ไม่แสดงเลขหน้า (ซ่อน)</option>
                </select>
            </div>

            <section class="flex items-center gap-2 border-t pt-4">
                <input type="checkbox" id="show-placeholder" checked onchange="togglePlaceholder()" class="w-4 h-4 text-[#009bc9] rounded border-gray-300 focus:ring-[#009bc9]">
                <label for="show-placeholder" class="text-xs text-gray-700 cursor-pointer select-none">แสดงพื้นที่เนื้อหา (จำลอง)</label>
            </section>

            <div class="sticky bottom-0 bg-white pt-2 pb-2 mt-auto border-t">
                <button onclick="exportPPTX()" id="download-btn" class="w-full bg-gradient-to-r from-[#f37737] to-[#009bc9] hover:from-[#e0682b] hover:to-[#0086af] text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all transform hover:scale-[1.02] active:scale-95 flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    <span id="btn-text">ดาวน์โหลดไฟล์ (PPTX)</span>
                </button>
            </div>
        </aside>

        <!-- Slide Preview Section -->
        <section class="w-full md:w-3/4 lg:w-[72%] h-full flex flex-col items-center justify-center p-4">
            <div id="slide-canvas" class="relative w-full aspect-video bg-white shadow-2xl rounded-sm overflow-hidden border border-gray-200" style="max-width: 100%; max-height: 80vh;">
                
                <div id="logo-el" class="logo-container logo-bottom-right" style="width: 15%;">
                    <img id="logo-img" crossorigin="anonymous" src="https://wsrv.nl/?url=www.erc.or.th/web-upload/200xf869baf82be74c18cc110e974eea8d5c/filecenter/admin_patawee/L/ERC%20New%20Logo%202014-BG%20white.jpg" style="border-radius: 2px;" alt="Organization Logo" class="w-full h-auto object-contain">
                </div>

                <div id="svg-container" class="absolute inset-0 w-full h-full pointer-events-none">
                </div>

                <div id="placeholder-content" class="absolute inset-0 flex flex-col items-center justify-center text-center p-16 hide-on-download transition-opacity duration-300">
                    <div class="border-4 border-dashed border-gray-400 rounded-3xl p-10 w-3/4 h-3/4 flex flex-col items-center justify-center bg-white/60 backdrop-blur-sm shadow-sm">
                        <h2 class="text-4xl font-bold text-gray-800 mb-4">พื้นที่สำหรับใส่เนื้อหา</h2>
                        <p class="text-xl text-gray-600">Content Area - อัตราส่วน 16:9</p>
                    </div>
                </div>

                <div id="page-number-preview" class="absolute text-gray-400 text-sm font-bold hide-on-download transition-all duration-300" style="bottom: 15px; left: 50%; transform: translateX(-50%);">
                    &lt;#&gt;
                </div>
            </div>
            <p class="text-gray-500 text-sm mt-6 text-center">💡 ปรับขนาดโลโก้ได้ตามความต้องการ โดยระบบจะคำนวณเป็น % ของความกว้างสไลด์</p>
        </section>
    </main>

            { id: 40, name: "40. Dual Triangles (สามเหลี่ยมคู่)", svg: `<svg viewBox="0 0 1920 1080" preserveAspectRatio="none" class="w-full h-full"><polygon points="0,0 600,0 0,800" fill="#009bc9" opacity="0.9"/><polygon points="0,0 800,0 0,1080" fill="#009bc9" opacity="0.2"/><polygon points="1920,1080 1320,1080 1920,280" fill="#f37737" opacity="0.9"/><polygon points="1920,1080 1120,1080 1920,0" fill="#f37737" opacity="0.2"/></svg>` }
        ];

        // ตัวแปรเก็บ Index ปัจจุบันเพื่อใช้กับการกดลูกศร
        let currentDesignIndex = 0;

        document.addEventListener('DOMContentLoaded', () => {
            renderDesignDropdown();
            // เริ่มต้นใช้งานดีไซน์แรกสุด (Index 0)
            changeDesignIndex(0); 
            updatePageNumberPosition();
            setupKeyboardNavigation();
        });

        // ---------------------------------------------------------
        // ส่วนจัดการ Custom Dropdown 
        // ---------------------------------------------------------
        
        function renderDesignDropdown() {
            const listEl = document.getElementById('design-list');
            let optionsHTML = '';

            designs.forEach((design, index) => {
                optionsHTML += `
                    <li>
                        <button id="design-option-${index}"
                                onclick="handleDesignSelection(${index})" 
                                class="design-option-btn w-full text-left px-4 py-2.5 text-sm transition-colors border-b border-gray-50 last:border-0 hover:bg-blue-50 text-gray-700 hover:text-[#009bc9]">
                            ${design.name}
                        </button>
                    </li>`;
            });

            listEl.innerHTML = optionsHTML;
        }

        // เมื่อถูกคลิกเลือกจากเมนู
        function handleDesignSelection(index) {
            changeDesignIndex(index);
            closeDropdown();
        }

        // เปลี่ยนดีไซน์ตาม Index พร้อมทำไฮไลต์ให้
        function changeDesignIndex(index) {
            if (index < 0 || index >= designs.length) return;
            
            currentDesignIndex = index;
            const design = designs[index];

            // 1. นำ SVG ไปแสดง
            document.getElementById('svg-container').innerHTML = design.svg;
            
            // 2. อัปเดตข้อความบนปุ่ม
            document.getElementById('selected-design-text').innerText = design.name;
            
            // 3. ทำไฮไลต์สีฟ้า และเลื่อน Scrollbar ตาม
            updateDropdownHighlight(index);
        }

        // ทำไฮไลต์เมนูที่ถูกเลือกและ Scroll ให้เห็นอัตโนมัติ
        function updateDropdownHighlight(index) {
            const allBtns = document.querySelectorAll('.design-option-btn');
            allBtns.forEach(btn => {
                btn.classList.remove('bg-blue-50', 'text-[#009bc9]', 'font-semibold');
                btn.classList.add('text-gray-700');
            });

            const activeBtn = document.getElementById(`design-option-${index}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-gray-700');
                activeBtn.classList.add('bg-blue-50', 'text-[#009bc9]', 'font-semibold');
                
                // คำนวณให้ Scroll เลื่อนตามปุ่มที่เลือกให้อยู่ตรงกลางจอ Dropdown
                const menu = document.getElementById('dropdown-menu');
                if (!menu.classList.contains('hidden')) {
                    const offsetTop = activeBtn.parentElement.offsetTop;
                    menu.scrollTop = offsetTop - (menu.clientHeight / 2) + (activeBtn.clientHeight / 2);
                }
            }
        }

        // ปุ่มควบคุมคีย์บอร์ด
        function setupKeyboardNavigation() {
            const dropdownBtn = document.getElementById('dropdown-btn');

            dropdownBtn.addEventListener('keydown', function(event) {
                if (event.key === 'ArrowDown') {
                    event.preventDefault(); // ป้องกันไม่ให้หน้าเว็บเลื่อนลง
                    changeDesignIndex(currentDesignIndex + 1);
                } 
                else if (event.key === 'ArrowUp') {
                    event.preventDefault(); // ป้องกันหน้าเว็บเลื่อนขึ้น
                    changeDesignIndex(currentDesignIndex - 1);
                } 
                else if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    toggleDropdown();
                } 
                else if (event.key === 'Escape') {
                    event.preventDefault();
                    closeDropdown();
                }
            });
        }

        // เปิด/ปิด Dropdown
        function toggleDropdown() {
            const menu = document.getElementById('dropdown-menu');
            const arrow = document.getElementById('dropdown-arrow');
            
            if (menu.classList.contains('hidden')) {
                // เปิด Dropdown
                menu.classList.remove('hidden');
                setTimeout(() => {
                    menu.classList.add('opacity-100');
                    updateDropdownHighlight(currentDesignIndex); // เลื่อนให้เห็นตัวปัจจุบัน
                }, 10);
                arrow.style.transform = 'rotate(180deg)';
            } else {
                // ปิด Dropdown
                closeDropdown();
            }
        }

        function closeDropdown() {
            const menu = document.getElementById('dropdown-menu');
            const arrow = document.getElementById('dropdown-arrow');
            
            menu.classList.remove('opacity-100');
            arrow.style.transform = 'rotate(0deg)';
            setTimeout(() => menu.classList.add('hidden'), 200); 
        }

        // ปิด Dropdown อัตโนมัติเมื่อคลิกพื้นที่อื่น
        document.addEventListener('click', (event) => {
            const container = document.getElementById('custom-dropdown-container');
            if (container && !container.contains(event.target)) {
                closeDropdown();
            }
        });

        // ---------------------------------------------------------

        function updateLogoImage() {
            const selectedType = document.getElementById('logo-type').value;
            document.getElementById('logo-img').src = logoUrls[selectedType];
        }

        function updateLogoPosition() {
            const pos = document.getElementById('logo-position').value;
            const logoEl = document.getElementById('logo-el');
            const currentWidth = logoEl.style.width;
            logoEl.className = 'logo-container ' + pos;
            logoEl.style.width = currentWidth;
        }

        function updateLogoSize() {
            const size = document.getElementById('logo-size-slider').value;
            const logoEl = document.getElementById('logo-el');
            const display = document.getElementById('size-display');
            logoEl.style.width = size + '%';
            display.innerText = size + '%';
        }

        function updatePageNumberPosition() {
            const pos = document.getElementById('page-num-position').value;
            const previewEl = document.getElementById('page-number-preview');

            previewEl.style.bottom = '15px';
            previewEl.style.left = 'auto';
            previewEl.style.right = 'auto';
            previewEl.style.transform = 'none';
            previewEl.style.display = 'block';

            if (pos === 'bottom-right') {
                previewEl.style.right = '20px';
            } else if (pos === 'bottom-center') {
                previewEl.style.left = '50%';
                previewEl.style.transform = 'translateX(-50%)';
            } else if (pos === 'bottom-left') {
                previewEl.style.left = '20px';
            } else if (pos === 'hidden') {
                previewEl.style.display = 'none';
            }
        }

        function togglePlaceholder() {
            const isChecked = document.getElementById('show-placeholder').checked;
            document.getElementById('placeholder-content').style.opacity = isChecked ? '1' : '0';
        }

        function exportPPTX() {
            const slideElement = document.getElementById('slide-canvas');
            const btnText = document.getElementById('btn-text');
            const downloadBtn = document.getElementById('download-btn');

            btnText.innerText = "กำลังประมวลผล...";
            downloadBtn.classList.add('opacity-75', 'cursor-not-allowed');
            downloadBtn.disabled = true;
            slideElement.classList.add('downloading'); 

            setTimeout(() => {
                html2canvas(slideElement, {
                    scale: 1920 / slideElement.offsetWidth, 
                    width: slideElement.offsetWidth,
                    height: slideElement.offsetHeight,
                    backgroundColor: "#ffffff",
                    useCORS: true, 
                    allowTaint: false
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');

                    let pptx = new PptxGenJS();
                    
                    pptx.defineLayout({ name: 'WIDESCREEN_16x9', width: 13.333, height: 7.5 });
                    pptx.layout = 'WIDESCREEN_16x9';

                    const pageNumPos = document.getElementById('page-num-position').value;
                    let slideNumberConfig = null;

                    if (pageNumPos === 'bottom-right') {
                        slideNumberConfig = { x: "90%", y: "94%", w: "5%", h: "4%", color: "666666", fontSize: 14, align: "right" };
                    } else if (pageNumPos === 'bottom-center') {
                        slideNumberConfig = { x: "45%", y: "94%", w: "10%", h: "4%", color: "666666", fontSize: 14, align: "center" };
                    } else if (pageNumPos === 'bottom-left') {
                        slideNumberConfig = { x: "5%", y: "94%", w: "5%", h: "4%", color: "666666", fontSize: 14, align: "left" };
                    }

                    let masterConfig = {
                        title: 'CUSTOM_TEMPLATE_MASTER',
                        background: { data: imgData }
                    };

                    if (slideNumberConfig) {
                        masterConfig.slideNumber = slideNumberConfig;
                    }

                    pptx.defineSlideMaster(masterConfig);
                    let slide = pptx.addSlide({ masterName: 'CUSTOM_TEMPLATE_MASTER' });

                    pptx.writeFile({ fileName: 'Template-Corporate-Presentation.pptx' }).then(() => {
                        resetDownloadState();
                    });

                }).catch(err => {
                    console.error("Canvas Rendering Error:", err);
                    resetDownloadState();
                    alert("เกิดข้อผิดพลาดในการสร้างไฟล์ กรุณาลองใหม่อีกครั้ง");
                });
            }, 100);

            function resetDownloadState() {
                slideElement.classList.remove('downloading');
                btnText.innerText = "ดาวน์โหลดไฟล์ (PPTX)";
                downloadBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                downloadBtn.disabled = false;
            }
        }
    </script>
