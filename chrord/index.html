<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Guitar Chord Finder</title>
    
    <!-- Library สำหรับวาดรูปคอร์ด -->
    <script src="https://omnibrain.github.io/svguitar/js/svguitar.umd.js"></script>
    
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--primary);
        }

        .container { max-width: 1200px; margin: 0 auto; text-align: center; }

        .header { margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        .status { color: #666; font-size: 0.9rem; }

        .controls {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        select {
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #dfe6e9;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:focus { border-color: var(--accent); outline: none; }

        #chord-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .chord-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }

        .chord-title { font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; color: var(--accent); }
        .chord-pos { font-size: 1rem; color: #7f8c8d; margin-bottom: 15px; }
        
        .chart-container { width: 100%; height: 320px; }

        /* Loading Spinner */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-top: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🎸 Ultimate Chord Finder</h1>
            <div id="loading-status" class="status">กำลังโหลดฐานข้อมูลคอร์ด...</div>
            <div id="loader" class="loader"></div>
        </div>

        <div class="controls hidden" id="main-controls">
            <!-- คีย์หลัก -->
            <select id="root-note">
                <option value="C">C</option>
                <option value="C#">C# / Db</option>
                <option value="D">D</option>
                <option value="Eb">Eb</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="F#">F#</option>
                <option value="G">G</option>
                <option value="Ab">Ab</option>
                <option value="A">A</option>
                <option value="Bb">Bb</option>
                <option value="B">B</option>
            </select>

            <!-- ประเภทคอร์ด -->
            <select id="chord-suffix">
                <!-- จะถูกเติมอัตโนมัติจาก Database -->
            </select>
        </div>

        <div id="chord-display"></div>
    </div>

    <script>
        let fullChordDb = null;

        // 1. ดึงข้อมูลคอร์ดทั้งหมดจาก GitHub ของ tombatossals (มาตรฐานโลก)
        async function fetchChordDb() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/tombatossals/chords-db/master/lib/guitar.json');
                const data = await response.json();
                fullChordDb = data.chords;
                
                initApp();
            } catch (error) {
                document.getElementById('loading-status').innerText = 'ไม่สามารถโหลดข้อมูลได้ โปรดตรวจสอบการเชื่อมต่ออินเทอร์เน็ต';
                console.error(error);
            }
        }

        function initApp() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('loading-status').innerText = 'ฐานข้อมูลพร้อมใช้งาน!';
            document.getElementById('main-controls').classList.remove('hidden');

            // สร้างรายการ Suffix (major, minor, 7, etc.) จากข้อมูลที่มีจริง
            const suffixes = new Set();
            Object.values(fullChordDb).forEach(chordVariations => {
                chordVariations.forEach(v => suffixes.add(v.suffix));
            });

            const suffixSelect = document.getElementById('chord-suffix');
            Array.from(suffixes).sort().forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.innerText = s === 'major' ? 'Major' : s;
                suffixSelect.appendChild(opt);
            });

            // ตั้งค่าเริ่มต้น
            suffixSelect.value = 'major';
            
            // ผูก Event
            document.getElementById('root-note').addEventListener('change', renderChords);
            suffixSelect.addEventListener('change', renderChords);

            renderChords();
        }

        function renderChords() {
            const root = document.getElementById('root-note').value;
            const suffix = document.getElementById('chord-suffix').value;
            const display = document.getElementById('chord-display');
            display.innerHTML = '';

            // ค้นหาคอร์ดที่เลือก
            const chordData = fullChordDb[root].find(c => c.suffix === suffix);

            if (!chordData) {
                display.innerHTML = `<p>ไม่พบรูปแบบคอร์ด ${root} ${suffix}</p>`;
                return;
            }

            // วนลูปแสดงทุก Position (เฟรตต่างๆ)
            chordData.positions.forEach((pos, index) => {
                const cardId = `chord-art-${index}`;
                const card = document.createElement('div');
                card.className = 'chord-card';
                card.innerHTML = `
                    <div class="chord-title">${root}${suffix === 'major' ? '' : suffix}</div>
                    <div class="chord-pos">แบบที่ ${index + 1} (เริ่มเฟรตที่ ${pos.baseFret})</div>
                    <div id="${cardId}" class="chart-container"></div>
                `;
                display.appendChild(card);

                // แปลงข้อมูลจาก DB เข้าสู่ SVGuitar Format
                const chart = new svguitar.SVGuitarChord(`#${cardId}`);
                
                // คำนวณนิ้วกด
                const fingers = [];
                pos.frets.forEach((fret, i) => {
                    if (fret > 0) {
                        const stringNum = 6 - i;
                        const fingerNum = pos.fingers[i] || 0;
                        fingers.push([stringNum, fret, fingerNum > 0 ? fingerNum.toString() : '']);
                    }
                });

                // ตั้งค่าการวาด
                chart.configure({
                    strings: 6,
                    frets: 5,
                    position: pos.baseFret,
                    fixedDiagramPosition: true,
                    fingerSize: 0.7,
                    barreChordRadius: 0.2,
                    title: ''
                })
                .chord({
                    fingers: fingers,
                    barres: pos.barres ? pos.barres.map(b => ({ fret: b, fromString: 6, toString: 1 })) : [], // โดยประมาณ
                    silent: pos.frets.map((f, i) => f === -1 ? 6 - i : null).filter(n => n),
                    open: pos.frets.map((f, i) => f === 0 ? 6 - i : null).filter(n => n)
                })
                .draw();
            });
        }

        // เริ่มโหลดข้อมูลเมื่อเปิดหน้าเว็บ
        fetchChordDb();
    </script>
</body>
</html>
