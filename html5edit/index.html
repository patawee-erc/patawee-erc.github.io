<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Editor - Ultimate</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1049/1049443.png">
    
    <!-- โหลด Ace Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    
    <!-- [ใหม่] โหลด Libraries สำหรับ Export PPTX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column;
            height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; background-color: #202020;
        }
        header {
            background-color: #333; color: #fff; padding: 0 15px;
            display: flex; justify-content: space-between; align-items: center;
            height: 50px; border-bottom: 1px solid #444;
        }
        h1 { font-size: 1.1rem; margin: 0; flex-shrink: 0; }
        .btn-group { display: flex; align-items: center; }
        .btn-group button {
            color: white; border: none; padding: 6px 12px; border-radius: 4px;
            cursor: pointer; margin-left: 6px; font-size: 0.85rem; font-weight: 600;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .btn-group button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-group button:active { transform: translateY(0); }
        button.run { background-color: #27ae60; }
        button.save { background-color: #8e44ad; }
        button.clear { background-color: #c0392b; }
        button.popup { background-color: #e67e22; }
        button.font-btn { background-color: #555; border: 1px solid #666; min-width: 35px; }
        button.font-btn:hover { background-color: #666; }
        .auto-run-label { font-size: 0.8rem; margin-left: 15px; cursor: pointer; user-select: none; white-space: nowrap; }
        .container { display: flex; flex: 1; width: 100%; height: calc(100vh - 50px); position: relative; }
        #editor-container { width: 50%; height: 100%; position: relative; }
        #editor { position: absolute; top: 0; right: 0; bottom: 0; left: 0; line-height: 1.5; }
        .resizer {
            width: 10px; background-color: #444; cursor: col-resize;
            display: flex; justify-content: center; align-items: center; z-index: 10;
        }
        .resizer:hover { background-color: #007acc; }
        .resizer::after { content: "⋮"; color: #888; font-weight: bold; }
        #preview-container { flex: 1; background-color: white; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; z-index: 20; }

        /* [ใหม่] สไตล์สำหรับ Modal แสดงสถานะ */
        #progressModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: #fff; color: #333;
            padding: 30px 40px; border-radius: 8px; text-align: center;
            width: 90%; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-content h3 { margin-top: 0; }
        .progress-wrapper {
            width: 100%; background-color: #e2e8f0; border-radius: 8px;
            margin-top: 15px; height: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background-color: #3b82f6; width: 0%;
            transition: width 0.3s ease;
        }
        #statusText { margin-top: 15px; font-weight: 500; }
        
        /* [ใหม่] สีปุ่ม Export PPTX */
        button.export-pptx { background-color: #d35400; }

    </style>
</head>
<body>

    <header>
        <h1>HTML Editor Pro</h1>
        <div class="btn-group">
            <button class="font-btn" onclick="changeFontSize(-2)" title="ลดขนาด">A-</button>
            <button class="font-btn" onclick="changeFontSize(2)" title="เพิ่มขนาด">A+</button>
            <span style="border-right: 1px solid #555; height: 20px; margin: 0 10px;"></span>
            <button class="clear" onclick="clearCode()">Clear</button>
            <button class="run" onclick="runCode()">Run ▶</button>
            <button class="popup" onclick="openPopup()">↗ Popup</button>
            <button class="save" onclick="saveCode()">💾 Save</button>

            <!-- [ใหม่] เพิ่มปุ่ม Export PPTX -->
            <button class="export-pptx" onclick="exportToPptx()">📊 Export PPTX</button>

            <label class="auto-run-label">
                <input type="checkbox" id="autoRun" checked> Auto Run
            </label>
        </div>
    </header>

    <div class="container" id="mainContainer">
        <div id="editor-container">
            <div id="editor"><!DOCTYPE html><html></html></div>
        </div>
        <div class="resizer" id="dragMe"></div>
        <div id="preview-container">
            <div class="overlay" id="iframeOverlay"></div>
            <iframe id="previewFrame"></iframe>
        </div>
    </div>

    <!-- [ใหม่] เพิ่ม Modal สำหรับแสดงสถานะ -->
    <div id="progressModal">
        <div class="modal-content">
            <h3>กำลังสร้างไฟล์ PowerPoint...</h3>
            <p>กรุณาอย่าปิดหน้านี้ ระบบกำลังทำงาน</p>
            <div class="progress-wrapper">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="statusText">กำลังเตรียมข้อมูล...</div>
        </div>
    </div>

    <!-- [ใหม่] เพิ่มพื้นที่ซ่อนสำหรับ iframe ที่ใช้แคปภาพ -->
   <div id="captureContainer" style="position: fixed; top: 0; left: 0; width: 1920px; height: 1080px; opacity: 0; pointer-events: none; z-index: -9999; overflow: hidden;"></div>


    <script>
        var editor = ace.edit("editor");
        editor.setTheme("ace/theme/monokai");
        editor.session.setMode("ace/mode/html");
        editor.setShowPrintMargin(false); 
        var currentFontSize = 16;
        editor.setOptions({
            fontSize: currentFontSize + "px",
            enableBasicAutocompletion: true,
            enableLiveAutocompletion: true
        });
        function changeFontSize(amount) {
            currentFontSize += amount;
            if(currentFontSize < 10) currentFontSize = 10;
            if(currentFontSize > 50) currentFontSize = 50;
            editor.setFontSize(currentFontSize + "px");
        }
        function runCode() {
            var code = editor.getValue();
            var frame = document.getElementById("previewFrame");
            frame.srcdoc = code;
        }
        editor.session.on('change', function(delta) {
            if(document.getElementById('autoRun').checked){ runCode(); }
        });
        function clearCode() {
            if(confirm("ต้องการล้างโค้ดทั้งหมด?")) { editor.setValue(""); }
        }
        function saveCode() {
            var codeContent = editor.getValue();
            var blob = new Blob([codeContent], { type: "text/html;charset=utf-8" });
            var link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "index.html"; 
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        function openPopup() {
            var code = editor.getValue();
            var win = window.open("", "_blank");
            if (win) {
                win.document.open();
                win.document.write(code);
                win.document.close();
            } else {
                alert("โปรดอนุญาตให้ Pop-up ทำงาน (Allow Pop-ups) สำหรับหน้านี้");
            }
        }
        window.onload = runCode;
        const resizer = document.getElementById('dragMe');
        const leftSide = document.getElementById('editor-container');
        const container = document.getElementById('mainContainer');
        const iframeOverlay = document.getElementById('iframeOverlay');
        let x = 0, leftWidth = 0;
        const mouseDownHandler = function(e) {
            x = e.clientX; leftWidth = leftSide.getBoundingClientRect().width;
            iframeOverlay.style.display = 'block';
            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseup', mouseUpHandler);
            document.body.style.cursor = 'col-resize';
            leftSide.style.userSelect = 'none';
        };
        const mouseMoveHandler = function(e) {
            const dx = e.clientX - x;
            const newLeftWidth = ((leftWidth + dx) * 100) / container.getBoundingClientRect().width;
            if(newLeftWidth > 10 && newLeftWidth < 90) { leftSide.style.width = `${newLeftWidth}%`; }
        };
        const mouseUpHandler = function() {
            iframeOverlay.style.display = 'none'; document.body.style.cursor = 'default';
            leftSide.style.removeProperty('user-select');
            document.removeEventListener('mousemove', mouseMoveHandler);
            document.removeEventListener('mouseup', mouseUpHandler);
        };
        resizer.addEventListener('mousedown', mouseDownHandler);

       
        // ==========================================
        //  ฟังก์ชัน Export to PPTX (รองรับฟอนต์ Kanit & Google Fonts เต็มรูปแบบ)
        // ==========================================
        async function exportToPptx() {
            const htmlContent = editor.getValue();
            if (!htmlContent.trim()) {
                alert('ยังไม่มีโค้ดสำหรับแปลงไฟล์ครับ!');
                return;
            }

            const modal = document.getElementById('progressModal');
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            modal.style.display = 'flex';
            progressFill.style.width = '0%';
            statusText.innerText = "⏳ กำลังสร้างพื้นที่และโหลดโค้ด...";

            // 1. สร้าง Iframe (ซ่อนอยู่หลังจอ)
            const captureContainer = document.getElementById('captureContainer');
            captureContainer.style.cssText = "position: fixed; top: 0; left: 0; width: 1920px; height: 1080px; opacity: 0.01; pointer-events: none; z-index: -1;";
            captureContainer.innerHTML = '';
            
            const iframe = document.createElement('iframe');
            iframe.style.width = '1920px';
            iframe.style.height = '1080px';
            iframe.style.border = 'none';
            captureContainer.appendChild(iframe);

            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(htmlContent);
            doc.close();

            statusText.innerText = "⏳ กำลังดาวน์โหลดฟอนต์ Kanit (Google Fonts)...";

            // 2. [เพิ่มใหม่] บังคับ Inject โค้ด Google Fonts Kanit เข้าไปใน Iframe เพื่อความชัวร์
            const kanitLink = doc.createElement('link');
            kanitLink.href = 'https://fonts.googleapis.com/css2?family=Kanit:wght@100;200;300;400;500;600;700;800;900&display=swap';
            kanitLink.rel = 'stylesheet';
            doc.head.appendChild(kanitLink);

            // รอ Iframe สร้าง DOM พื้นฐาน
            await new Promise(resolve => setTimeout(resolve, 1500));

            // 3. [สำคัญมาก] บังคับให้ Browser รอจนกว่าฟอนต์ "Kanit" จะถูกโหลดเสร็จจริงๆ
            try {
                if (doc.fonts) {
                    // สั่งให้โหลดฟอนต์ Kanit ล่วงหน้า (บังคับโหลดแบบ 400 ธรรมดา และ 700 ตัวหนา)
                    await doc.fonts.load('400 16px "Kanit"');
                    await doc.fonts.load('700 16px "Kanit"');
                    await doc.fonts.ready; // รอให้ฟอนต์ทุกตัวในระบบพร้อม
                }
            } catch (e) {
                console.warn("Font API loading issue", e);
            }

            // ให้เวลา Render อีกนิดหลังฟอนต์มาถึง
            await new Promise(resolve => setTimeout(resolve, 1000));

            // 4. Inject CSS แก้ปัญหาฟอนต์ Kanit (สระจม/ตัวหนังสือติดกัน)
            const fixStyle = doc.createElement('style');
            fixStyle.innerHTML = `
                .slide { transition: none !important; opacity: 0 !important; visibility: hidden !important; transform: none !important; animation: none !important; }
                .slide.active { opacity: 1 !important; visibility: visible !important; transform: none !important; }
                #presentation { transform: scale(1) !important; margin: 0 !important; top: 0 !important; left: 0 !important; }
                .controls, .progress-bar-container, .slide-counter { display: none !important; }
                
                /* [สำคัญสำหรับ Kanit] แก้ตัวอักษรเกยกันและสระด้านบน/ล่างถูกตัด */
                * {
                    font-kerning: none !important;
                    text-rendering: geometricPrecision !important;
                    -webkit-font-smoothing: antialiased !important;
                    letter-spacing: 0px !important;
                    line-height: 1.5 !important; /* ป้องกันสระภาษาไทยด้านบน/ล่าง (เช่น ไม้โท, สระอู) โดนตัด */
                }
            `;
            doc.head.appendChild(fixStyle);

            const presentation = doc.getElementById('presentation');
            const slides = doc.querySelectorAll('.slide');

            if (!presentation || !slides || slides.length === 0) {
                statusText.innerText = "❌ ไม่พบ #presentation หรือ .slide ในโค้ดครับ";
                await new Promise(resolve => setTimeout(resolve, 3000));
                modal.style.display = 'none';
                return;
            }
            
            // 5. เริ่มสร้าง PPTX และวนลูปแคปภาพ
            let pptx = new PptxGenJS();
            pptx.layout = 'LAYOUT_16x9';

            for (let i = 0; i < slides.length; i++) {
                statusText.innerText = `📸 กำลังเรนเดอร์สไลด์... (${i + 1}/${slides.length})`;
                
                slides.forEach(s => s.classList.remove('active'));
                slides[i].classList.add('active');
                
                // รอหน้าจออัปเดต
                await new Promise(resolve => setTimeout(resolve, 800));

                try {
                    const canvas = await html2canvas(presentation, { 
                        scale: 2,               
                        useCORS: true,          // จำเป็นมากสำหรับ Google Fonts
                        allowTaint: true,       
                        logging: false,
                        backgroundColor: window.getComputedStyle(presentation).backgroundColor || '#ffffff',
                    });
                    
                    const imgData = canvas.toDataURL("image/jpeg", 0.95);

                    let pptSlide = pptx.addSlide();
                    pptSlide.addImage({ data: imgData, x: 0, y: 0, w: '100%', h: '100%' });

                } catch (err) {
                    console.error("Error capturing slide", i, err);
                }

                let progressPercent = ((i + 1) / slides.length) * 100;
                progressFill.style.width = progressPercent + '%';
            }

            // 6. บันทึกและดาวน์โหลดไฟล์
            statusText.innerText = "💾 กำลังแพ็คไฟล์ PowerPoint...";
            try {
                await pptx.writeFile({ fileName: "Presentation_Export.pptx" });
                statusText.innerText = "✅ สำเร็จ! ไฟล์กำลังถูกดาวน์โหลด";
                setTimeout(() => { modal.style.display = 'none'; captureContainer.innerHTML = ''; }, 2000);
            } catch (err) {
                statusText.innerText = "❌ เกิดข้อผิดพลาดตอนเซฟ: " + err.message;
                console.error(err);
                setTimeout(() => { modal.style.display = 'none'; captureContainer.innerHTML = ''; }, 5000);
            }
        }

    </script>
</body>
</html>
