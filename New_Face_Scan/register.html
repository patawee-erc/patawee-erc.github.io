<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนใบหน้า</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      /* พื้นหลังโทนสว่าง สะอาดตา */
      background: #f1f5f9; 
      color: #334155;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      position: relative;
    }

    /* วงกลมแสงตกแต่งพื้นหลังให้ดูมีมิติ (Modern Ambient) */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: linear-gradient(135deg, #e0e7ff 0%, #dbeafe 100%);
      border-radius: 50%;
      filter: blur(80px);
      top: -100px; left: -100px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: linear-gradient(135deg, #fae8ff 0%, #f3e8ff 100%);
      border-radius: 50%;
      filter: blur(80px);
      bottom: -100px; right: -100px;
      pointer-events: none; z-index: 0;
    }

    /* กล่องเนื้อหาหลัก (Card) */
    .container {
      background: #ffffff;
      width: 100%;
      max-width: 500px;
      position: relative; z-index: 1;
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 40px rgba(148, 163, 184, 0.15);
      animation: fadeIn 0.6s ease;
    }

    /* Header */
    .page-header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    h2 {
      font-size: 1.8em; font-weight: 700;
      /* ไล่สีตัวอักษรให้ดู Modern */
      background: linear-gradient(135deg, #2563eb, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .instruction {
      font-size: 0.9em; color: #64748b; line-height: 1.5;
    }

    /* Step dots */
    .step-dots {
      display: flex; justify-content: center; gap: 12px;
      margin: 16px 0 24px;
    }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #e2e8f0;
      transition: all 0.4s ease;
    }
    .dot.active {
      background: #4f46e5;
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(79, 70, 229, 0.4);
    }

    /* Status */
    #status {
      font-size: 0.9em; color: #64748b;
      margin-bottom: 16px; min-height: 20px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #e2e8f0;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Video */
    .video-wrapper {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #f8fafc;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      border: 4px solid #f1f5f9;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    video {
      width: 100%; display: block;
      transform: scaleX(-1);
      border-radius: 16px;
    }

    /* Form Section */
    .form-section {
      margin-top: 28px;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }
    .input-group input {
      width: 100%;
      padding: 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      color: #1e293b;
      font-size: 15px;
      font-family: 'Sarabun', sans-serif;
      outline: none;
      transition: all 0.3s ease;
    }
    .input-group input::placeholder { color: #94a3b8; }
    .input-group input:focus {
      background: #ffffff;
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    #btnSave {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4f46e5, #3b82f6);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Sarabun', sans-serif;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.25);
    }
    #btnSave:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.35);
    }
    #btnSave:disabled {
      background: #e2e8f0;
      color: #94a3b8;
      box-shadow: none;
      cursor: not-allowed;
      transform: translateY(0);
    }

    .count-badge {
      background: rgba(255,255,255,0.25);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 14px;
    }
    #btnSave:disabled .count-badge {
      background: #cbd5e1;
      color: #64748b;
    }

    #msg {
      margin-top: 16px; min-height: 24px;
      font-size: 0.95em; font-weight: 600;
      text-align: center;
    }
    .msg-success { color: #10b981; }
    .msg-error   { color: #ef4444; }

    /* ====== Popup Modal (ปรับเป็นสีสว่าง) ====== */
    .modal-overlay {
      display: none; 
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.3); /* โปร่งแสง ดูคลีนๆ */
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.4s ease;
    }
    .modal-box {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 24px;
      text-align: center;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.1);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-box h3 {
      color: #10b981;
      margin-bottom: 8px;
      font-size: 1.6em;
    }
    .modal-box p {
      color: #64748b;
      font-size: 0.95em;
      margin-bottom: 24px;
    }
    .btn-redirect {
      width: 100%;
      padding: 16px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Sarabun', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25);
    }
    .btn-redirect:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.35);
      background: #059669;
    }
    
    @keyframes popIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin   { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Popup Modal -->
<div id="successModal" class="modal-overlay">
  <div class="modal-box">
    <h3>✅ ลงทะเบียนสำเร็จ</h3>
    <p>ระบบบันทึกข้อมูลใบหน้าของคุณเรียบร้อยแล้ว</p>
    <button class="btn-redirect" onclick="window.location.href='https://patawee-erc.github.io/New_Face_Scan/scan.html'">ไปที่หน้า สแกนใบหน้า</button>
  </div>
</div>
<!-- ======================= -->

<div class="container">
  <div class="page-header">
    <h2>👤 ลงทะเบียนใบหน้า</h2>
    <p class="instruction">บันทึก 3 มุม: หน้าตรง / หันซ้ายเล็กน้อย / หันขวาเล็กน้อย<br>เพื่อความแม่นยำสูงสุด</p>
  </div>

  <div class="step-dots">
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
  </div>

  <div id="status">
    <span class="spinner"></span> กำลังเตรียมระบบ AI...
  </div>

  <div class="video-wrapper">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="form-section">
    <div class="input-group">
      <input type="text" id="username" placeholder="กรอกชื่อ-นามสกุลพนักงาน">
    </div>

    <button id="btnSave" onclick="saveFace()" disabled>
      📸 บันทึกใบหน้า <span id="saveCount" class="count-badge">0</span>
    </button>

    <div id="msg"></div>
  </div>
</div>

<script>
  const API_URL   = localStorage.getItem('gasApiUrl') || GAS_API_URL;
  const video     = document.getElementById('video');
  const statusDiv = document.getElementById('status');
  const btnSave   = document.getElementById('btnSave');
  const msgDiv    = document.getElementById('msg');
  const countSpan = document.getElementById('saveCount');
  let saveCounter = 0;

  if (!API_URL) {
    statusDiv.innerHTML = '<span style="color:#ef4444">❌ ยังไม่ได้ตั้งค่า API URL — <a href="config.html" style="color:#2563eb">ไปตั้งค่า</a></span>';
  } else {
    window.addEventListener('load', initModels);
  }

  function updateDots() {
    [1,2,3].forEach(i => {
      const dot = document.getElementById('dot' + i);
      dot.className = 'dot' + (i <= saveCounter ? ' active' : '');
    });
  }

  async function initModels() {
    try {
      const MODEL_URL = 'http://patawee-erc.github.io/models';
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri('https://patawee-erc.github.io/New_Face_Scan/models'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://patawee-erc.github.io/New_Face_Scan/models'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://patawee-erc.github.io/New_Face_Scan/models')
      ]);
      startCamera();
    } catch (e) {
      statusDiv.innerHTML = '<span style="color:#ef4444">❌ โหลด AI Model ล้มเหลว: ' + e.message + '</span>';
    }
  }

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => {
        video.srcObject = stream;
        statusDiv.innerText = '';
        btnSave.disabled = false;
      })
      .catch(err => {
        statusDiv.innerHTML = '<span style="color:#ef4444">❌ เปิดกล้องไม่ได้: ' + err.message + '</span>';
      });
  }

  async function saveFace() {
    const nameInput = document.getElementById('username');
    const name = nameInput.value.trim();
    if (!name) return alert('กรุณาใส่ชื่อก่อนทำการบันทึกใบหน้า');

    btnSave.disabled = true;
    btnSave.innerHTML = '<span class="spinner" style="border-top-color: white;"></span> กำลังประมวลผล... <span class="count-badge">' + saveCounter + '</span>';
    msgDiv.innerText = '';

    const detection = await faceapi
      .detectSingleFace(video)
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (!detection) {
      alert('ไม่พบใบหน้า! กรุณามองกล้องให้ชัดเจนและอยู่ในที่สว่าง');
      btnSave.disabled = false;
      btnSave.innerHTML = '📸 บันทึกใบหน้า <span class="count-badge" id="saveCount">' + saveCounter + '</span>';
      return;
    }

    const descriptorArray = Array.from(detection.descriptor);

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'registerUser', name, faceDescriptor: descriptorArray })
      });
      const data = await res.json();

      saveCounter++;
      if(document.getElementById('saveCount')) {
         document.getElementById('saveCount').innerText = saveCounter;
      }
      updateDots();

      if (saveCounter >= 3) {
        // แสดง Popup
        document.getElementById('successModal').style.display = 'flex';
        
        // ล็อคปุ่มและช่องกรอกชื่อ
        btnSave.innerHTML = '✅ ลงทะเบียนเรียบร้อย';
        btnSave.disabled = true; 
        nameInput.disabled = true;
        msgDiv.innerHTML = '';
      } else {
        // กรณียังไม่ครบ 3 ครั้ง
        msgDiv.innerHTML = '<span class="msg-success">✅ บันทึกครั้งที่ ' + saveCounter + ' สำเร็จ! ขยับหน้าเล็กน้อยแล้วกดอีกครั้ง</span>';
        btnSave.disabled = false;
        btnSave.innerHTML = '📸 บันทึกมุมต่อไป <span class="count-badge" id="saveCount">' + saveCounter + '</span>';
      }

    } catch (e) {
      msgDiv.innerHTML = '<span class="msg-error">❌ บันทึกล้มเหลว: ' + e.message + '</span>';
      btnSave.disabled = false;
      btnSave.innerHTML = '📸 ลองใหม่อีกครั้ง <span class="count-badge" id="saveCount">' + saveCounter + '</span>';
    }
  }
</script>
</body>
</html>
