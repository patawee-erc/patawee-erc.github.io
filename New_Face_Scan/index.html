<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบบันทึกเวลาเข้างาน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      /* พื้นหลังโทนสว่าง */
      background: #f1f5f9;
      color: #334155;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* วงกลมแสงตกแต่งพื้นหลังให้ดูมีมิติ (Modern Ambient) */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: linear-gradient(135deg, #e0e7ff 0%, #dbeafe 100%);
      top: -150px; left: -150px;
    }
    body::after {
      width: 450px; height: 450px;
      background: linear-gradient(135deg, #dcfce7 0%, #f0fdf4 100%);
      bottom: -150px; right: -150px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
      position: relative; z-index: 1;
      animation: fadeInDown 0.6s ease;
    }
    .logo-img {
      width: 140px;
      margin-bottom: 20px;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05));
    }
    h1 {
      font-size: 1.8em;
      font-weight: 700;
      /* ไล่สีตัวอักษรให้ดู Modern */
      background: linear-gradient(135deg, #2563eb, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 0.95em;
      color: #64748b;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* Warning */
    .api-warning {
      display: none;
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #d97706;
      border-radius: 16px;
      padding: 14px 20px;
      width: 100%;
      max-width: 380px;
      margin-bottom: 24px;
      font-size: 0.9em;
      text-align: center;
      position: relative; z-index: 1;
      animation: fadeIn 0.5s ease;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.1);
    }
    .api-warning a { color: #b45309; font-weight: 700; text-decoration: none; }
    .api-warning a:hover { text-decoration: underline; }

    /* Menu Cards */
    .menu-cards {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative; z-index: 1;
    }

    .btn-menu {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 24px;
      text-decoration: none;
      border-radius: 20px;
      background: #ffffff;
      border: 2px solid #f8fafc;
      box-shadow: 0 10px 25px rgba(148, 163, 184, 0.1);
      transition: all 0.3s ease;
      animation: fadeInUp 0.5s ease both;
    }
    .btn-menu:nth-child(1) { animation-delay: 0.1s; }
    .btn-menu:nth-child(2) { animation-delay: 0.2s; }
    .btn-menu:nth-child(3) { animation-delay: 0.3s; }

    .btn-menu:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(148, 163, 184, 0.2);
      border-color: #ffffff;
    }

    .card-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      color: white;
    }
    
    /* สีไอคอนของแต่ละเมนู */
    .btn-register .card-icon { 
      background: linear-gradient(135deg, #4f46e5, #3b82f6); 
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); 
    }
    .btn-scan .card-icon { 
      background: linear-gradient(135deg, #10b981, #059669); 
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); 
    }

    .card-text { flex: 1; text-align: left; }
    .card-title { font-size: 1.1em; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .card-desc  { font-size: 0.85em; color: #64748b; line-height: 1.4; }

    .card-arrow {
      font-size: 20px; color: #94a3b8;
      font-weight: bold;
      transition: transform 0.3s ease, color 0.3s ease;
    }
    .btn-menu:hover .card-arrow { transform: translateX(4px); color: #3b82f6; }

    /* Animations */
    @keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp  { from { opacity: 0; transform: translateY(20px);  } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="header">
    <!-- ใช้โลโก้ ERC จากหน้าแสกนให้แบรนดิ้งไปในทางเดียวกัน -->
    <img src="https://www.erc.or.th/web-upload/200xf869baf82be74c18cc110e974eea8d5c/filecenter/admin_patawee/L/ERC%20New%20Logo%202014.png" alt="ERC Logo" class="logo-img">
    <h1>ระบบบันทึกเวลาเข้างาน</h1>
    <p class="subtitle">Face Recognition &amp; GPS Attendance</p>
  </div>

  <div id="apiWarning" class="api-warning">
    ⚠️ ยังไม่ได้ตั้งค่าการเชื่อมต่อ API<br>
    <a href="config.html">ไปที่หน้าตั้งค่าระบบ</a>
  </div>

  <div class="menu-cards">
    <a href="register.html" class="btn-menu btn-register">
      <div class="card-icon">👤</div>
      <div class="card-text">
        <div class="card-title">ลงทะเบียนพนักงาน</div>
        <div class="card-desc">บันทึกข้อมูลใบหน้าใหม่เข้าระบบ</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a href="scan.html" class="btn-menu btn-scan">
      <div class="card-icon">📷</div>
      <div class="card-text">
        <div class="card-title">สแกนเข้างาน</div>
        <div class="card-desc">ยืนยันตัวตนด้วยใบหน้าและ GPS</div>
      </div>
      <span class="card-arrow">›</span>
    </a>
  </div>

  <script>
    // ตรวจสอบว่ามีการตั้งค่า API URL แล้วหรือยัง
    if (!localStorage.getItem('gasApiUrl') && typeof GAS_API_URL === 'undefined') {
      document.getElementById('apiWarning').style.display = 'block';
    }
  </script>
</body>
</html>
