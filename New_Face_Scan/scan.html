<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สแกนเข้างาน ERC</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      /* พื้นหลังโทนสว่าง */
      background: #f1f5f9;
      color: #334155;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* วงกลมแสงตกแต่งพื้นหลังให้ดูมีมิติ (Modern Ambient) */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: linear-gradient(135deg, #dcfce7 0%, #dbeafe 100%);
      border-radius: 50%;
      filter: blur(80px);
      top: -100px; left: -100px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%);
      border-radius: 50%;
      filter: blur(80px);
      bottom: -100px; right: -100px;
      pointer-events: none; z-index: 0;
    }

    /* กล่องเนื้อหาหลัก (Card) */
    .page-wrap {
      background: #ffffff;
      width: 100%; 
      max-width: 500px;
      position: relative; z-index: 1;
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 40px rgba(148, 163, 184, 0.15);
      animation: fadeIn 0.6s ease;
      display: flex; flex-direction: column; align-items: center;
    }

    /* Header */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; margin-bottom: 20px;
    }
    
    h2 {
      font-size: 1.4em; font-weight: 700;
      /* ไล่สีตัวอักษรให้ดู Modern */
      background: linear-gradient(135deg, #2563eb, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .spacer { width: 80px; } /* ดันให้ h2 อยู่ตรงกลางเทียบกับโลโก้ */

    /* Status Area */
    .status-area {
      width: 100%; text-align: center; margin-bottom: 20px;
    }
    #main-status {
      font-size: 0.95em; color: #64748b; font-weight: 600;
      min-height: 22px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #gps-status {
      font-size: 0.85em; color: #64748b; margin-top: 8px;
      min-height: 18px;
    }

    /* GPS Alert */
    .gps-alert {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #ef4444;
      border-radius: 16px; padding: 14px 16px;
      width: 100%; margin-bottom: 16px;
      font-size: 0.9em; font-weight: 600;
      text-align: center;
    }

    /* Scanner Container */
    .video-container {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      background: #f8fafc;
      border: 4px solid #f1f5f9;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      min-height: 280px;
    }

    video {
      width: 100%; height: auto; display: block;
      transform: scaleX(-1);
      opacity: 0;
      transition: opacity 0.5s ease;
      border-radius: 16px;
    }
    video.active { opacity: 1; }

    /* Scanner frame corners */
    .scanner-frame {
      position: absolute; inset: 0; z-index: 5; pointer-events: none;
    }
    .corner {
      position: absolute;
      width: 28px; height: 28px;
      border-color: #10b981;
      border-style: solid;
      opacity: 0.9;
    }
    .corner-tl { top: 16px;    left: 16px;   border-width: 4px 0 0 4px; border-radius: 8px 0 0 0; }
    .corner-tr { top: 16px;    right: 16px;  border-width: 4px 4px 0 0; border-radius: 0 8px 0 0; }
    .corner-bl { bottom: 16px; left: 16px;   border-width: 0 0 4px 4px; border-radius: 0 0 0 8px; }
    .corner-br { bottom: 16px; right: 16px;  border-width: 0 4px 4px 0; border-radius: 0 0 8px 0; }

    /* Scan line */
    .scan-line {
      display: none;
      position: absolute; left: 8%; right: 8%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #10b981, transparent);
      box-shadow: 0 0 10px rgba(16,185,129,0.8);
      z-index: 6;
      animation: scanMove 2s ease-in-out infinite;
    }
    .scan-line.active { display: block; }

    /* Overlay status badge */
    #overlay-status {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.7); /* ป้ายทับกล้องใช้สีเข้มให้อ่านง่าย */
      backdrop-filter: blur(8px);
      color: #ffffff;
      padding: 6px 18px; border-radius: 30px;
      z-index: 10; white-space: nowrap; font-size: 0.85em; font-weight: 600;
    }

    /* Start Button */
    #btnStart {
      display: none;
      background: linear-gradient(135deg, #4f46e5, #3b82f6);
      color: white; border: none; border-radius: 50px;
      padding: 16px 44px; font-size: 18px; font-weight: 600;
      cursor: pointer; font-family: 'Sarabun', sans-serif;
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.25);
      margin: 10px auto 10px;
      transition: all 0.3s ease;
      animation: btnPulse 2s ease-in-out infinite;
    }
    #btnStart:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.35);
      animation: none;
    }

    /* ===== Modal (สีสว่าง) ===== */
    .modal-overlay {
      display: none; position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4); /* พื้นหลังโปร่งแสงคลีนๆ */
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease;
    }
    .modal-content {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 24px;
      width: 90%; max-width: 360px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; align-items: center;
      animation: modalSlideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-avatar {
      font-size: 52px;
      background: #eff6ff;
      border: 3px solid #dbeafe;
      border-radius: 50%;
      width: 90px; height: 90px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.1);
    }
    .modal-title { font-size: 0.9em; color: #64748b; margin-bottom: 4px; font-weight: 600;}
    .user-name {
      font-size: 24px; color: #1e293b; font-weight: 700;
      margin-bottom: 16px;
    }
    .time-badge {
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      color: #059669;
      padding: 8px 24px; border-radius: 30px;
      font-size: 16px; font-weight: 700;
      margin-bottom: 8px;
    }
    .score-text { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }

    .btn {
      border: none; border-radius: 16px; cursor: pointer; width: 100%;
      margin: 6px 0; font-family: 'Sarabun', sans-serif;
      transition: all 0.3s ease;
    }
    .btn-confirm {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      padding: 16px; font-size: 18px; font-weight: 700;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25);
      margin-bottom: 12px;
    }
    .btn-confirm:hover:not(:disabled) {
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.35);
      transform: translateY(-2px);
    }
    .btn-confirm:disabled { background: #e2e8f0; color: #94a3b8; box-shadow: none; cursor: not-allowed; transform: none;}
    
    .btn-cancel {
      background: #f1f5f9;
      color: #64748b;
      padding: 14px; font-size: 16px; font-weight: 600;
    }
    .btn-cancel:hover { background: #e2e8f0; color: #475569; }

    /* Animations */
    @keyframes fadeIn      { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes btnPulse    { 0%,100% { box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3); } 50% { box-shadow: 0 4px 35px rgba(59, 130, 246, 0.6); } }
    @keyframes scanMove    { 0% { top: 12%; } 50% { top: 82%; } 100% { top: 12%; } }
    @keyframes modalSlideUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
<div class="page-wrap">

  <div class="top-bar">
    <img src="https://www.erc.or.th/web-upload/200xf869baf82be74c18cc110e974eea8d5c/filecenter/admin_patawee/L/ERC%20New%20Logo%202014.png" width="35%" alt="ERC Logo">
    <h2>📷 สแกนเข้างาน</h2>
    <div class="spacer"></div>
  </div>

  <div class="status-area">
    <div id="main-status">⏳ กำลังเตรียมระบบ...</div>
    <div id="gps-status"></div>
  </div>

  <div id="gps-alert-box" class="gps-alert">
    ⚠️ คุณอยู่นอกพื้นที่ที่กำหนด!<br>กรุณาเข้าใกล้จุดเช็คอินแล้วรีเฟรชหน้าจอ
  </div>

  <button id="btnStart" onclick="startCamera()">📷 แตะเพื่อเริ่มสแกน</button>

  <div class="video-container">
    <div class="scanner-frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-line" id="scanLine"></div>
    </div>
    <div id="overlay-status">รอเปิดกล้อง...</div>
    <video id="video" autoplay muted playsinline></video>
  </div>

</div>

<!-- Confirm Modal -->
<div id="confirmModal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-avatar">🙋🏻‍♂️</div>
    <p class="modal-title">พบข้อมูลพนักงาน</p>
    <div class="user-name" id="modalName">...</div>
    <div id="modalTime" class="time-badge">00:00</div>
    <div id="modalScore" class="score-text"></div>
    <button class="btn btn-confirm" id="btnConfirm" onclick="confirmAttendance()">✅ ยืนยันเข้างาน</button>
    <button class="btn btn-cancel" onclick="cancelAttendance()">ไม่ใช่ฉัน สแกนใหม่</button>
  </div>
</div>

<script>
  const API_URL        = localStorage.getItem('gasApiUrl') || GAS_API_URL;
  const video          = document.getElementById('video');
  const mainStatus     = document.getElementById('main-status');
  const overlayStatus  = document.getElementById('overlay-status');
  const confirmModal   = document.getElementById('confirmModal');
  const gpsStatus      = document.getElementById('gps-status');
  const gpsAlertBox    = document.getElementById('gps-alert-box');
  const btnStart       = document.getElementById('btnStart');

  const MATCH_THRESHOLD = 0.45;

  let knownFaces   = [];
  let scanInterval = null;
  let currentMatch = null;
  let currentLat   = null;
  let currentLng   = null;

  if (!API_URL) {
    showError('โหลดค่า API URL ไม่สำเร็จ กรุณาตั้งค่าก่อนใช้งาน');
  } else {
    window.addEventListener('load', init);
  }

  async function init() {
    try {
      mainStatus.innerText = '1/4 กำลังตรวจสอบตำแหน่ง GPS...';
      await checkGPS();
    } catch (e) {
      showError(e.message);
    }
  }

  // ===== GPS =====
  function checkGPS() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('Browser ของคุณไม่รองรับ GPS'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        async pos => {
          currentLat = pos.coords.latitude;
          currentLng = pos.coords.longitude;

          try {
            const config = await fetch(API_URL + '?action=getConfig').then(r => r.json());

            if (!config.lat || !config.lng || config.radius == 0) {
              gpsStatus.innerHTML = '<span style="color:#059669">📍 GPS: อนุญาตให้สแกนทุกพื้นที่</span>';
              resolve();
              initFaceSystem();
              return;
            }

            const dist = haversineKm(currentLat, currentLng, config.lat, config.lng);

            if (dist <= config.radius) {
              gpsStatus.innerHTML = '<span style="color:#059669">📍 GPS: อยู่ในพื้นที่ (ห่าง ' + dist.toFixed(3) + ' km)</span>';
              resolve();
              initFaceSystem();
            } else {
              gpsStatus.innerHTML = '<span style="color:#ef4444">📍 GPS: อยู่นอกพื้นที่ (ห่าง ' + dist.toFixed(3) + ' km / กำหนด ' + config.radius + ' km)</span>';
              gpsAlertBox.style.display = 'block';
              mainStatus.innerText = '⛔ ไม่สามารถสแกนได้';
              overlayStatus.innerText = 'อยู่นอกพื้นที่';
            }
          } catch (e) {
            reject(new Error('เชื่อมต่อ API ล้มเหลว: ' + e.message));
          }
        },
        () => reject(new Error('กรุณาเปิดอนุญาต Location Service (GPS) ก่อนใช้งาน'))
      );
    });
  }

  // ===== Load AI =====
  async function initFaceSystem() {
    mainStatus.innerText = '2/4 กำลังโหลดระบบ AI...';
    const MODEL_URL = 'http://patawee-erc.github.io/models';
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri('https://patawee-erc.github.io/New_Face_Scan/models'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://patawee-erc.github.io/New_Face_Scan/models'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://patawee-erc.github.io/New_Face_Scan/models')
      ]);
      loadFaceDatabase();
    } catch (e) {
      showError('โหลดระบบ AI ล้มเหลว: ' + e.message);
    }
  }

  // ===== Load DB =====
  async function loadFaceDatabase() {
    mainStatus.innerText = '3/4 โหลดฐานข้อมูลพนักงาน...';
    try {
      const data = await fetch(API_URL + '?action=getKnownFaces').then(r => r.json());
      if (!data || data.length === 0) return showError('ไม่พบข้อมูลพนักงานในระบบ กรุณาลงทะเบียนก่อน');

      knownFaces = data.map(u => ({
        name: u.label,
        descriptor: new Float32Array(u.descriptor)
      }));

      mainStatus.innerText    = '✅ ระบบพร้อมใช้งาน';
      mainStatus.style.color  = '#10b981';
      btnStart.style.display  = 'block';
    } catch (e) {
      showError('โหลดฐานข้อมูลล้มเหลว: ' + e.message);
    }
  }

  // ===== Camera =====
  function startCamera() {
    btnStart.style.display = 'none';
    mainStatus.innerText   = 'กำลังเปิดกล้อง...';
    mainStatus.style.color = '#64748b';

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => {
        video.srcObject = stream;
        video.classList.add('active');
        mainStatus.innerText   = '✅ กำลังสแกน...';
        mainStatus.style.color = '#10b981';
        document.getElementById('scanLine').classList.add('active');
        startScanLoop();
      })
      .catch(err => {
        showError('เปิดกล้องไม่ได้: ' + err.message);
        btnStart.style.display = 'block';
      });
  }

  // ===== Scan Loop =====
  function startScanLoop() {
    if (scanInterval) clearInterval(scanInterval);
    overlayStatus.innerText     = 'มองกล้องเพื่อให้ระบบสแกน';
    overlayStatus.style.background = 'rgba(15, 23, 42, 0.7)';

    scanInterval = setInterval(async () => {
      if (video.paused || video.ended) return;

      const detection = await faceapi
        .detectSingleFace(video)
        .withFaceLandmarks()
        .withFaceDescriptor();

      if (detection) {
        const best = findBestMatch(detection.descriptor);
        if (best.distance < MATCH_THRESHOLD) {
          clearInterval(scanInterval);
          document.getElementById('scanLine').classList.remove('active');
          showModal(best);
        } else {
          overlayStatus.innerText            = 'ไม่รู้จักบุคคลนี้ (' + best.distance.toFixed(2) + ')';
          overlayStatus.style.background     = 'rgba(239, 68, 68, 0.9)'; // สีแดงเข้มขึ้นให้อ่านง่าย
        }
      }
    }, 500);
  }

  function findBestMatch(queryDesc) {
    let best = { name: 'unknown', distance: 1.0 };
    knownFaces.forEach(u => {
      const d = faceapi.euclideanDistance(queryDesc, u.descriptor);
      if (d < best.distance) best = { name: u.name, distance: d };
    });
    return best;
  }

  // ===== Modal =====
  function showModal(match) {
    currentMatch = match.name;
    document.getElementById('modalName').innerText  = match.name;

    const now = new Date();
    const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('modalTime').innerText  = 'เวลาเข้างาน: ' + timeStr + ' น.';

    const pct = ((1 - match.distance) * 100).toFixed(1);
    document.getElementById('modalScore').innerText = 'ความแม่นยำ: ' + pct + '%';

    confirmModal.style.display = 'flex';
    mainStatus.innerText = 'กรุณายืนยันตัวตน...';
    mainStatus.style.color = '#3b82f6';
  }

  async function confirmAttendance() {
    const btn = document.getElementById('btnConfirm');
    btn.disabled   = true;
    btn.innerText  = 'กำลังบันทึกข้อมูล...';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'logAttendance', name: currentMatch, lat: currentLat, lng: currentLng })
      });
      const data = await res.json();
      alert('✅ ' + (data.message || 'บันทึกเวลาสำเร็จ'));
      window.location.href = 'scan.html';
    } catch (e) {
      alert('❌ บันทึกล้มเหลว: ' + e.message);
      btn.disabled  = false;
      btn.innerText = '✅ ยืนยันเข้างาน';
    }
  }

  function cancelAttendance() {
    confirmModal.style.display = 'none';
    currentMatch = null;
    if (scanInterval) clearInterval(scanInterval);

    if (video.srcObject) {
      video.srcObject.getTracks().forEach(t => t.stop());
      video.srcObject = null;
    }
    video.classList.remove('active');
    document.getElementById('scanLine').classList.remove('active');

    mainStatus.innerText    = '✅ ระบบพร้อมใช้งาน';
    mainStatus.style.color  = '#10b981';
    overlayStatus.innerText = 'รอเปิดกล้อง...';
    overlayStatus.style.background = 'rgba(15, 23, 42, 0.7)';
    btnStart.style.display  = 'block';
  }

  // ===== Helpers =====
  function showError(msg) {
    mainStatus.innerHTML = '<span style="color:#ef4444">❌ ' + msg + '</span>';
  }

  function haversineKm(lat1, lon1, lat2, lon2) {
    const R    = 6371;
    const dLat = deg2rad(lat2 - lat1);
    const dLon = deg2rad(lon2 - lon1);
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function deg2rad(deg) { return deg * Math.PI / 180; }
</script>
</body>
</html>
