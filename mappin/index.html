<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนที่ไทย - ปักหมุดระบุรัศมี</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Sarabun', sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        /* สไตล์กล่องควบคุมและคำแนะนำ */
        .info-box {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 12px 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            /* เปลี่ยนเป็น auto เพื่อให้สามารถคลิกปุ่มหรือช่องกรอกข้อมูลได้ */
            pointer-events: auto; 
        }

        .input-group {
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .input-group input {
            width: 70px;
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="info-box">
        <b>วิธีใช้:</b> คลิกที่ไหนก็ได้บนแผนที่เพื่อปักหมุดและแสดงรัศมี
        <div class="input-group">
            <label for="radius-km">ระบุรัศมี:</label>
            <input type="number" id="radius-km" value="10" min="0.1" step="0.5">
            <span>กิโลเมตร</span>
        </div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. ตั้งค่าแผนที่
        const map = L.map('map').setView([13.5, 100.5], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // ตัวแปรสำหรับเก็บ Marker และ Circle เพื่อให้ลบอันเก่าได้
        let currentMarker = null;
        let currentCircle = null;
        let geojsonLayer;

        // ดึง Element ของช่องกรอกรัศมี
        const radiusInput = document.getElementById('radius-km');

        // 2. ฟังก์ชันเมื่อคลิกบนแผนที่ (ปักหมุด + รัศมี)
        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;

            // ดึงค่ารัศมีจาก Input และแปลงเป็นตัวเลข (หากค่าไม่ถูกต้องจะใช้ค่าเริ่มต้นเป็น 10)
            let radiusKm = parseFloat(radiusInput.value);
            if (isNaN(radiusKm) || radiusKm <= 0) {
                radiusKm = 10;
                radiusInput.value = 10;
            }

            // แปลงกิโลเมตรเป็นเมตร (1 กม. = 1,000 เมตร)
            const radiusMeters = radiusKm * 1000;

            // ลบหมุดและวงกลมเก่า (ถ้ามี)
            if (currentMarker) map.removeLayer(currentMarker);
            if (currentCircle) map.removeLayer(currentCircle);

            // สร้างหมุดใหม่
            currentMarker = L.marker([lat, lng]).addTo(map)
                .bindPopup(`จุดที่ปัก: ${lat.toFixed(4)}, ${lng.toFixed(4)}<br>รัศมี: ${radiusKm} กม.`)
                .openPopup();

            // สร้างวงกลมตามรัศมีที่กำหนด
            currentCircle = L.circle([lat, lng], {
                color: '#EA4335',      // สีเส้นขอบวงกลม
                fillColor: '#EA4335',  // สีพื้นวงกลม
                fillOpacity: 0.2,      // ความโปร่งใส
                radius: radiusMeters   // รัศมีหน่วยเป็น "เมตร"
            }).addTo(map);
        });

        // 3. ส่วนของข้อมูลจังหวัด
        function style(feature) {
            return {
                fillColor: '#4285F4',
                weight: 1,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.3
            };
        }

        function onEachFeature(feature, layer) {
            const provinceName = feature.properties.pro_th || feature.properties.name || "จังหวัด";
            layer.bindTooltip(provinceName, { sticky: true });
            
            layer.on({
                mouseover: (e) => {
                    e.target.setStyle({ weight: 2, fillOpacity: 0.5 });
                },
                mouseout: (e) => {
                    geojsonLayer.resetStyle(e.target);
                }
            });
        }

        // โหลดข้อมูล GeoJSON จังหวัด
        const geojsonUrl = 'https://raw.githubusercontent.com/chingchai/OpenGISData-Thailand/master/provinces.geojson';
        fetch(geojsonUrl)
            .then(res => res.json())
            .then(data => {
                geojsonLayer = L.geoJson(data, {
                    style: style,
                    onEachFeature: onEachFeature
                }).addTo(map);
            });

    </script>
</body>
</html>
